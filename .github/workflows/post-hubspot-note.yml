name: Post HubSpot Note

on:
  push:
    paths:
      - 'pending_notes/**.json'

jobs:
  post-note:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post note to HubSpot
        env:
          HS_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: |
          echo "=== STARTING HUBSPOT NOTE POST ==="

          NOTE_FILE=$(git diff-tree --no-commit-id -r --name-only ${{ github.sha }} | grep 'pending_notes/' | head -1)
          echo "Note file: $NOTE_FILE"

          if [ -z "$NOTE_FILE" ]; then
            echo "No note file found"
            exit 0
          fi

          CONTACT_EMAIL=$(jq -r '.contact_email' "$NOTE_FILE")
          NOTE_BODY=$(jq -r '.note_body' "$NOTE_FILE")
          echo "Contact email: $CONTACT_EMAIL"
          echo "Note body length: ${#NOTE_BODY}"

          # Check token is set
          if [ -z "$HS_TOKEN" ]; then
            echo "ERROR: HUBSPOT_TOKEN secret is empty or not set"
            exit 1
          fi
          echo "Token present: YES (length ${#HS_TOKEN})"

          # Find contact in HubSpot
          echo "=== SEARCHING FOR CONTACT ==="
          SEARCH_RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.hubapi.com/crm/v3/objects/contacts/search" \
            -H "Authorization: Bearer $HS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"filterGroups\":[{\"filters\":[{\"propertyName\":\"email\",\"operator\":\"EQ\",\"value\":\"$CONTACT_EMAIL\"}]}],\"properties\":[\"email\",\"firstname\",\"lastname\"]}")

          HTTP_STATUS=$(echo "$SEARCH_RESP" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$SEARCH_RESP" | grep -v "HTTP_STATUS:")
          echo "Search HTTP status: $HTTP_STATUS"
          echo "Search response: $BODY"

          CONTACT_ID=$(echo "$BODY" | jq -r '.results[0].id // empty')
          echo "Contact ID: $CONTACT_ID"

          if [ -z "$CONTACT_ID" ]; then
            echo "ERROR: Contact not found for $CONTACT_EMAIL"
            exit 1
          fi

          # Post note
          echo "=== POSTING NOTE ==="
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          NOTE_JSON=$(echo "$NOTE_BODY" | jq -Rs .)

          NOTE_RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.hubapi.com/crm/v3/objects/notes" \
            -H "Authorization: Bearer $HS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"properties\":{\"hs_timestamp\":\"$TIMESTAMP\",\"hs_note_body\":$NOTE_JSON},\"associations\":[{\"to\":{\"id\":\"$CONTACT_ID\"},\"types\":[{\"associationCategory\":\"HUBSPOT_DEFINED\",\"associationTypeId\":202}]}]}")

          NOTE_STATUS=$(echo "$NOTE_RESP" | grep "HTTP_STATUS:" | cut -d: -f2)
          NOTE_BODY_RESP=$(echo "$NOTE_RESP" | grep -v "HTTP_STATUS:")
          echo "Note HTTP status: $NOTE_STATUS"
          echo "Note response: $NOTE_BODY_RESP"

          NOTE_ID=$(echo "$NOTE_BODY_RESP" | jq -r '.id // empty')
          if [ -z "$NOTE_ID" ]; then
            echo "ERROR: Note creation failed"
            exit 1
          fi

          echo "=== SUCCESS: Note ID $NOTE_ID posted to contact $CONTACT_ID ==="
